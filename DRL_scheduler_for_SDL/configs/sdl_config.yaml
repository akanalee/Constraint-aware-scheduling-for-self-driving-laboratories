# SDL Scheduling - Unified Configuration
# All runtime and case-study parameters in one file.

# ============================================================
# Runtime Environment Config (consumed by SDLEnv)
# ============================================================
env_config:
  case_study: "sdl_standard"
  n_jobs: 40
  buffer_size: 100
  load_factor: 0.8
  initial_jobs: 1

  tmax_constraints:
    - {from_step: "S3", to_step: "S4", max_interval: 10}
    - {from_step: "S4", to_step: "S6", max_interval: 30.0}
    - {from_step: "S4", to_step: "S7", max_interval: 30.0}
    - {from_step: "S2", to_step: "S3", max_interval: 10}

  setup_times: {}

  mask_config:
    tmax_lookahead_depth: 2
    tmax_time_budget_ms: 10
    cache_enabled: true

# ============================================================
# Case Study Definition (consumed by DatasetGenerator)
# ============================================================

process_steps:
  S1_substrate_prep:
    name: "Substrate Preparation"
    machines:
      - { id: "SPU_1",  type: "substrate_processor", capacity: 1 }
      - { id: "SPU_2",  type: "substrate_processor", capacity: 1 }
      - { id: "SPU_3",  type: "substrate_processor", capacity: 1 }
      - { id: "SPU_4",  type: "substrate_processor", capacity: 1 }
      - { id: "SPU_5",  type: "substrate_processor", capacity: 1 }
      - { id: "SPU_6",  type: "substrate_processor", capacity: 1 }
      #- { id: "SPU_7",  type: "substrate_processor", capacity: 1 }
      #- { id: "SPU_8",  type: "substrate_processor", capacity: 1 }
      #- { id: "SPU_9",  type: "substrate_processor", capacity: 1 }
      #- { id: "SPU_10", type: "substrate_processor", capacity: 1 }
      #- { id: "SPU_11", type: "substrate_processor", capacity: 1 }
      #- { id: "SPU_12", type: "substrate_processor", capacity: 1 }
    processing_time:
      base: 2.5
      std: 0.5
      distribution: "normal"

  S2_robotic_transfer:
    name: "Robotic Transfer"
    machines:
      - { id: "robot_arm_A", type: "6dof_robot", capacity: 1 }
      - { id: "robot_arm_B", type: "6dof_robot", capacity: 1 }
      #- { id: "robot_arm_C", type: "6dof_robot", capacity: 1 }
      #- { id: "robot_arm_D", type: "6dof_robot", capacity: 1 }
      #- { id: "robot_arm_E", type: "6dof_robot", capacity: 1 }
      #- { id: "robot_arm_F", type: "6dof_robot", capacity: 1 }
      #- { id: "robot_arm_G", type: "6dof_robot", capacity: 1 }
      #- { id: "robot_arm_H", type: "6dof_robot", capacity: 1 }
    processing_time:
      base: 1.0
      std: 0.1
      distribution: "normal"

  S3_pre_reaction:
    name: "Pre-reaction Treatment"
    machines:
      - { id: "pre_reactor_A", type: "pre_reactor", capacity: 1 }
      - { id: "pre_reactor_B", type: "pre_reactor", capacity: 1 }
      - { id: "pre_reactor_C", type: "pre_reactor", capacity: 1 }
      - { id: "pre_reactor_D", type: "pre_reactor", capacity: 1 }
      - { id: "pre_reactor_E", type: "pre_reactor", capacity: 1 }
      - { id: "pre_reactor_F", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_G", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_H", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_I", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_J", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_K", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_L", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_M", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_N", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_O", type: "pre_reactor", capacity: 1 }
      #- { id: "pre_reactor_P", type: "pre_reactor", capacity: 1 }
    processing_time:
      base: 5.0
      std: 1.5
      distribution: "normal"

  S4_reactor:
    name: "Deposition Reactor"
    machines:
      - { id: "reactor_1",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_2",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_3",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_4",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_5",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_6",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_7",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_8",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_9",  type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_10", type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_11", type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      - { id: "reactor_12", type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      #- { id: "reactor_13", type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      #- { id: "reactor_14", type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      #- { id: "reactor_15", type: "deposition_reactor", capacity: 1, atlas_controlled: true }
      #- { id: "reactor_16", type: "deposition_reactor", capacity: 1, atlas_controlled: true }
    processing_time:
      base: 5.0
      std: 2.75
      distribution: "atlas_modulated"

  S5_cooling:
    name: "Post-reaction Cooling"
    machines:
      - { id: "cooling_chamber_A", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
      - { id: "cooling_chamber_B", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
      - { id: "cooling_chamber_C", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
      - { id: "cooling_chamber_D", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
      - { id: "cooling_chamber_E", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
      - { id: "cooling_chamber_F", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
      #- { id: "cooling_chamber_G", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
      #- { id: "cooling_chamber_H", type: "cooling_chamber", capacity: 1, cooling_rate: 5 }
    processing_time:
      base: 5.0
      std: 1.0
      distribution: "normal"

  S6_spectroscopy:
      name: "Spectroscopy Characterization"
      machines:
        - { id: "spectrometer_A", type: "spectrometer", capacity: 1 }
        - { id: "spectrometer_B", type: "spectrometer", capacity: 1 }
        #- { id: "spectrometer_C", type: "spectrometer", capacity: 1 }
        #- { id: "spectrometer_D", type: "spectrometer", capacity: 1 }
        #- { id: "spectrometer_E", type: "spectrometer", capacity: 1 }
        #- { id: "spectrometer_F", type: "spectrometer", capacity: 1 }
      processing_time:
        base: 5.0
        std: 1.0
        distribution: "normal"

  S7_mass_spec:
      name: "Mass Spectrometry"
      machines:
        - { id: "ICP_MS_A", type: "mass_spectrometer", capacity: 1, is_bottleneck: true }
        - { id: "ICP_MS_B", type: "mass_spectrometer", capacity: 1, is_bottleneck: true }
        #- { id: "ICP_MS_C", type: "mass_spectrometer", capacity: 1, is_bottleneck: true }
        #- { id: "ICP_MS_D", type: "mass_spectrometer", capacity: 1, is_bottleneck: true }
      processing_time:
        base: 10.0
        std: 1.0
        distribution: "normal"
#！！！！
tmax_constraints:
  - from_step: "S3"
    to_step: "S4"
    max_interval: 10.0
    reason: "Prevent sample surface oxidation"
    severity: "critical"
    penalty_factor: 100.0
  - from_step: "S4"
    to_step: "S6"
    max_interval: 15.0
    reason: "Film quality degradation in air"
    severity: "critical"
    penalty_factor: 100.0
  - from_step: "S4"
    to_step: "S7"
    max_interval: 15.0
    reason: "Chemical composition stability"
    severity: "critical"
    penalty_factor: 100.0
  - from_step: "S2"
    to_step: "S3"
    max_interval: 15.0
    reason: "Solution evaporation on substrate"
    severity: "moderate"
    penalty_factor: 50.0
  - from_step: "S6"
    to_step: "S7"
    max_interval: 30.0
    reason: "Cross-contamination prevention"
    severity: "low"
    penalty_factor: 20.0

job_types:
  SDL_experiment:
    sequence: ["S1", "S2", "S3", "S4", "S5", "S2", "S6", "S2", "S7"]
    material: "sample"
    substrate: "substrate"
    priority: "normal"
    weight: 1.0

atlas_config:
  parameter_space:
    temperature: [400, 600]
    pressure: [1, 10]
    flow_rate: [10, 100]
    time: [5, 20]
  exploration_schedule:
    phase_1:
      jobs_range: [0, 10]
      param_variation: 0.25
    phase_2:
      jobs_range: [10, 50]
      param_variation: 0.10
    phase_3:
      jobs_range: [50, 200]
      param_variation: 0.05
  learning_model: "gaussian_process"
  seed: 42

experiment_scales:
  debug:
    n_jobs: 5
    load_factor: 0.5
    job_type_weights: [1.0]
  small:
    n_jobs: 20
    load_factor: 0.6
    job_type_weights: [1.0]
  medium:
    n_jobs: 50
    load_factor: 0.8
    job_type_weights: [1.0]
  large:
    n_jobs: 200
    load_factor: 0.9
    job_type_weights: [1.0]
