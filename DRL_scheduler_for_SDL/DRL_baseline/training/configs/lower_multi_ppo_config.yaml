# Lower-Level Multi-PPO训练配置

experiment_name: "SDL_Lower_MultiPPO"
seed: 42

# 环境配置
env_config:
  case_study: "sdl_standard"
  n_jobs: 50
  buffer_size: 100
  load_factor: 0.8
  initial_jobs: 1
  debug_tmax_deadlock: false  # 生产环境关闭
  # debug_tmax_deadlock: true   # 调试时开启

  # Tmax约束
  tmax_constraints:
    - {from_step: "S3", to_step: "S4", max_interval: 10, penalty: 100.0}
    - {from_step: "S4", to_step: "S6", max_interval: 25.0, penalty: 100.0}
    - {from_step: "S4", to_step: "S7", max_interval: 30.0, penalty: 100.0}
    - {from_step: "S2", to_step: "S3", max_interval: 10, penalty: 50.0}

  # Atlas模拟
  atlas_config:
    enabled: true
    config_path: "configs/atlas_config.yaml"

# Agent配置
agent_config:
  # PNA Encoder
  node_dim: 5  # [LB, is_scheduled, slack, urgency, type_embed]
  edge_dim: 2  # [precedence_weight, compatibility_score]
  hidden_dim: 128
  num_layers: 3

  # PNA特定参数
  aggregators: ['mean', 'min', 'max', 'std']
  scalers: ['identity', 'amplification', 'attenuation']

  # Decoders
  op_decoder:
    type: "transformer"
    d_model: 128
    nhead: 4
    num_layers: 1
    dim_feedforward: 256
    dropout: 0.1

  mach_decoder:
    type: "cross_attention_transformer"
    d_model: 128
    nhead: 4
    num_layers: 1
    dim_feedforward: 256
    dropout: 0.1

  # Critic
  critic_hidden_dims: [256, 128, 64]

  # 优化器
  encoder_lr: 1e-4
  actor_lr: 3e-4
  critic_lr: 1e-3
  encoder_lr_after_unfreeze: 1e-5

# Multi-PPO参数（严格遵循论文）
ppo_config:
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  max_grad_norm: 0.5

  # 训练参数
  ppo_epochs: 10
  minibatch_size: 64
  rollout_steps: 2048

# Mask配置
mask_config:
  tmax_lookahead_depth: 2
  tmax_time_budget_ms: 10
  cache_enabled: true

# 训练流程
training:
  # BC预训练
  load_bc_weights: true
  bc_checkpoint_path: "checkpoints/bc_pretrained.pt"

  # Encoder冻结
  freeze_encoder_steps: 500

  # 训练步数
  n_iterations: 5000

  # 评估
  eval_interval: 100
  eval_episodes: 10

  # 保存
  batch_size: 4       # ✅ 加这一行
  save_interval: 4
  checkpoint_dir: "checkpoints/lower_multi_ppo"

# 日志
logging:
  log_dir: "logs/lower_multi_ppo"
  tensorboard: true
  wandb: false
  print_interval: 10